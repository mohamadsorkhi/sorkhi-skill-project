services:
    service :
        build: .
        ports:
            - 13000:8000
        volumes:
            - .:/app
            - /app/vendor
        environment:
            APP_ENV: local
            APP_DEBUG: "true"
            APP_URL: http://localhost:13000
            APP_LOCALE: fa
            APP_FALLBACK_LOCALE: fa
            SESSION_DRIVER: file
            CACHE_STORE: file
            CACHE_DRIVER: file
            QUEUE_CONNECTION: sync
            DB_CONNECTION: mysql
            DB_HOST: db
            DB_PORT: 3306
            DB_SOCKET: ""
            DB_DATABASE: club
            DB_USERNAME: root
            DB_PASSWORD: loop
        command: sh -lc "composer install && php artisan serve --host=0.0.0.0 --port=8000"
        depends_on:
            - db


    db:
        image: mysql:8
        restart: always
        environment:
            MYSQL_DATABASE: club
            MYSQL_USER: loop
            MYSQL_PASSWORD: loop
            MYSQL_ROOT_PASSWORD: loop
        volumes:
            - mysql8_data:/var/lib/mysql
        ports:
            - 34067:3306

volumes:
    mysql8_data:
